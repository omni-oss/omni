# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/workspace-gen"

extends:
  - "@workspace/omni/presets/ts-lib.omni.yaml"

dependencies:
  - omni_workspace_gen_wasm

tasks:
  build:
    enabled: true
    dependencies:
      append:
        - omni_workspace_gen_wasm#build
    exec: >
      bun -e '
        import { $ } from "bun";
        await $`cp -r ../../crates/omni_workspace_gen_wasm/dist ./dist`;
        if (await Bun.file("./dist/package.json").exists()) {
          await $`rm ./dist/package.json`;
        }
        if (await Bun.file("./dist/.gitignore").exists()) {
          await $`rm ./dist/.gitignore`;
        }
        if (await Bun.file("./dist/dist").exists()) {
          await $`rm -r ./dist/dist`;
        }
      '
    cache:
      key:
        files:
          - "../../crates/omni_workspace_gen_wasm/src/**"
          - "../../crates/omni_workspace_gen_wasm/Cargo.toml"
      output:
        files:
          - "dist/**"

  test:unit:
    enabled: false

  test:integration:
    enabled: false

  test:
    enabled: false

  publish:
    enabled: true

meta:
  publish: true

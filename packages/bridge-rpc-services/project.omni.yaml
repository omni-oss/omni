# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/bridge-rpc-services"

extends:
  - "@workspace/omni/presets/ts-vite-lib.omni.yaml"

dependencies:
  append:
    - "@omni-oss/tsconfig"
    - "@omni-oss/vite-config"
    - "@omni-oss/vitest-config"
    - "@omni-oss/bridge-rpc-core"
    - "@omni-oss/bridge-rpc-utils"
    - "@omni-oss/runtime-utils"
    - "@omni-oss/channels"
    - "@omni-oss/async-utils"
    - "@omni-oss/log"
    - "@omni-oss/system-interface"
    - "@omni-oss/bridge-rpc-system-interface"

tasks:
  test:unit:
    enabled: true

  test:integration:
    enabled: true

  test:
    enabled: true

  build:
    enabled: true

  publish:
    enabled: false

meta:
  publish: false

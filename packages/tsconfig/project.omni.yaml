# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/tsconfig"

extends:
  - "@workspace/omni/presets/base.omni.yaml"

cache:
  key:
    files:
      append:
        - base.json
        - types.json
        - with-paths.json

tasks:
  publish: bun publish --tolerate-republish
  test:
    exec: ''
    dependencies:
      - passthrough

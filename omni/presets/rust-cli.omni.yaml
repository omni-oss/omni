# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: rust-cli

extends:
  - ./rust.omni.yaml

tasks:
  build:
    exec: cargo build --release --package ${PROJECT_NAME} ${RUST_BUILD_ADDITIONAL_ARGS:-}
    cache:
      key:
        env:
          append: [RUST_BUILD_ADDITIONAL_ARGS]
      output:
        files:
          append:
            - "@workspace/target/release/{{ env.PROJECT_NAME }}"
            - "@workspace/target/release/{{ env.PROJECT_NAME }}.exe"
    dependencies:
      - test

  install:
    cache:
      enabled: false
    exec: cargo install --path .
    dependencies:
      - test

meta:
  type: cli
  release:
    github: true

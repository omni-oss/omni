# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: rust

cache:
  key:
    files:
      - "Cargo.toml"
      - "./src/**/*.rs"

extends:
  - "./base.omni.yaml"

tasks:
  test:
    exec: cargo test -p ${PROJECT_NAME} ${RUST_TEST_ADDITIONAL_ARGS:-}
    dependencies:
      - ^test
    env:
      vars:
        # RUST_LOG_SPAN_EVENTS: new,close
        RUST_LOG: trace

    cache:
      key:
        env:
          append:
            - RUST_TEST_ADDITIONAL_ARGS
        files:
          append: ["./tests/**/*.rs"]

  bench:
    enabled: false
    exec: cargo bench -p ${PROJECT_NAME} ${RUST_BENCH_ADDITIONAL_ARGS:-}
    dependencies:
      - test
      - ^bench
    cache:
      key:
        files:
          append: ["./benches/**/*.rs"]

  profile:
    enabled: false
    cache:
      enabled: true
      output:
        files:
          append:
            - perf.data
            - perf.data.old
            - flamegraph.svg

    exec: >
      cargo flamegraph
        --profile=${profile:-bench-with-debug}
        --bench ${bench:-${PROJECT_NAME}_benchmarks}
        -c "record -F 997 --call-graph fp -g -e cycles:u"
        -p ${project:-${PROJECT_NAME}}
        ${RUST_PROFILE_ADDITIONAL_ARGS:-}
        --
        --bench --profile-time=${profile_time:-5}
        ${RUST_PROFILE_ADDITIONAL_TRAILING_ARGS:-}

meta:
  language: rust

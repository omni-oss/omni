# yaml-language-server: $schema=../../.artifacts/generator.json
name: crate
display_name: Rust Crate
description: Generate a new rust crate

inputs:
  - type: boolean
    name: use_tracing
    message: Use tracing
    default: true

  - type: string
    name: crate_type
    message: Crate type
    default: lib
    allowed:
      - name: Library
        value: lib
      - name: Binary
        value: bin

  - type: string
    name: crate_name
    message: Crate name
    default: "{{ output_dir | base_name }}"
    validators:
      - condition: "{{ value | length > 0 }}"
        error_message: Crate name must not be empty
      - condition: "{{ value is matching(pat='^[a-zA-Z_]{1}[a-zA-Z0-9_-]*$') }}"
        error_message: >
          Crate name must only contain alphanumeric characters, underscores, and hyphens,
          and must start with a letter

  - type: string
    name: version
    message: Version
    default: "custom"
    allowed:
      - name: Inherit from workspace
        value: workspace
        description: Inherit the workspace version
      - name: Custom
        value: custom
        description: Set own crate version

  - if: "{{ inputs.version == 'custom' }}"
    type: string
    name: crate_version
    message: Crate version
    default: "0.0.0"
    validators:
      - condition: "{{ value | length > 0 }}"
        error_message: Crate version must not be empty
      - condition: "{{ value is matching(pat='^\\\\d+\\\\.\\\\d+\\\\.\\\\d+(?:-(?:[\\\\w\\\\d]+)(?:(?:\\\\.[\\\\w\\\\d]*)*(?:\\\\+[\\\\d\\\\w]+)?)?)?$') }}"
        error_message: Crate version must be in the format of x.y.z

  - type: boolean
    name: add_error_type
    message: Add crate level error type
    default: true

  - if: "{{ inputs.add_error_type }}"
    type: string
    name: error_name
    message: Error type name
    default: "Error"

targets:
  root: .
  src: "@output/src"
  lib: "@output/src/lib.rs"
  root_cargo_toml: "@workspace/Cargo.toml"
  cog_config: "@workspace/cog.toml"

vars:
  error_mod_name: "{% if inputs.error_name %}{{ inputs.error_name | snake_case }}{% endif %}"

actions:
  - type: add-many
    base_path: templates
    target: root
    files:
      - templates/**
      - "!templates/src/main.rs.tpl"

  - if: "{{ inputs.crate_type == 'bin' }}"
    type: add
    target: root
    file: templates/src/main.rs.tpl
    base_path: templates

  - if: "{{ inputs.add_error_type }}"
    type: run-generator
    generator: rust-error
    targets:
      root: ./src
    input_values:
      forward: all

  - if: "{{ inputs.add_error_type }}"
    type: prepend-content
    target: lib
    entries:
      - content: |
          {% if vars.error_mod_name == 'error' %}
          pub mod {{ vars.error_mod_name }};
          {% else %}
          pub mod {{ vars.error_mod_name }} as error;
          {% endif %}
        pattern: "@anchor:mods"

  - type: prepend-content
    target: root_cargo_toml
    entries:
      - content: '{{ inputs.crate_name }} = { path = "{{ data.generated_dir }}" }'
        pattern: "@anchor:new-crate"
    data:
      generated_dir: "{{ output_dir | replace(from='\\\\', to='/') }}"

  - type: prepend-content
    target: cog_config
    entries:
      - content: |
          [monorepo.packages.{{ inputs.crate_name }}]
          path = "{{ data.generated_dir }}"
          include = [
              "{{ data.generated_dir }}/**",
          ]
          public_api = false
        pattern: "@anchor:new-rust-package"
    data:
      generated_dir: "{{ output_dir | replace(from='\\\\', to='/') }}"

  - type: transform-many
    command: rustfmt
    supports_dry_run: true
    files:
      - "**/*.rs"

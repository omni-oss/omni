# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/generator.json
name: ts-package
display_name: TypeScript Package
description: A TypeScript package generator

prompts:
  - name: package_name
    type: text
    message: What is the name of your package?
    default: "{{ output_dir | base_name }}"
    validate:
      - condition: "{{ value | length > 0 }}"
        error_message: Package name must not be empty
      - condition: "{{ value is matching('^[a-zA-Z_]{1}[a-zA-Z0-9_-]*$') }}"
        error_message: >
          Package name must only contain alphanumeric characters, underscores, and hyphens,
          and must start with a letter

  - name: package_type
    type: select
    message: What type of package is this?
    options:
      - name: Library
        value: lib
      - name: Application
        value: app
      - name: Script
        value: script
      - name: Service Tests
        value: service-tests
      - name: E2E Tests
        value: e2e-tests
    default: lib

  - if: "{{ prompts.package_type == 'script' }}"
    name: script_can_be_used_as_lib
    type: confirm
    message: Can this script be used as a library?
    default: false

  - if: "{{ prompts.package_type == 'script' }}"
    name: shebang_executor
    type: select
    message: What shebang should be used for the script?
    options:
      - name: Node.js
        value: "node"
      - name: Bun
        value: "bun"
      - name: Deno
        value: "deno"
    default: "node"

  - name: package_description
    type: text
    message: What is the description of your package?
    default: A TypeScript Package

  - if: "{{ prompts.package_type != 'e2e-tests' and prompts.package_type != 'service-tests' }}"
    name: unit_test
    type: confirm
    message: Do you want to add unit tests?
    default: true

  - if: "{{ prompts.package_type != 'e2e-tests' and prompts.package_type != 'service-tests' }}"
    name: integration_test
    type: confirm
    message: Do you want to add integration tests?
    default: true

  - name: package_version
    type: text
    message: What is the version of your package?
    default: 0.0.0-semantically-released

  - name: package_license
    type: text
    message: What is the license of your package?
    default: MIT

  - name: published
    type: confirm
    message: Will the package be published to a registry?
    default: false

  - if: "{{ prompts.published }}"
    name: publish_access
    type: select
    message: What is the publish access of your package?
    options:
      - name: Public
        value: public
      - name: Restricted
        value: restricted
    default: public

targets:
  cog_config: "@workspace/cog.toml"

vars:
  full_package_name: "@omni-oss/{{ prompts.package_name }}"
  generated_dir: "{{ output_dir | relative_path(root=workspace_dir) | replace(from='\\', to='/') }}"

actions:
  - type: add-many
    base_path: templates
    files:
      - templates/**/*
      - "!templates/src/add.ts.tpl"
      - "!templates/src/cli/index.ts.tpl"
      - "!templates/vitest.config.*.ts.tpl"
      - "!templates/src/__tests__/integration.spec.ts.tpl"
      - "!templates/src/add.spec.ts.tpl"

  - if: "{{ prompts.package_type == 'lib' or prompts.package_type == 'script' }}"
    type: add-many
    base_path: templates
    files:
      - templates/src/add.ts.tpl

  - if: "{{ prompts.package_type == 'script' }}"
    type: add-many
    base_path: templates
    files:
      - templates/src/cli/index.ts.tpl

  - if: "{{ prompts.package_type == 'e2e-tests' }}"
    type: add-many
    base_path: templates
    files:
      - "templates/vitest.config.e2e.ts.tpl"

  - if: "{{ prompts.package_type == 'service-tests' }}"
    type: add-many
    base_path: templates
    files:
      - "templates/vitest.config.service.ts.tpl"

  - if: "{{ prompts.integration_test | default(value=false) }}"
    type: add-many
    base_path: templates
    files:
      - templates/vitest.config.integration.ts.tpl
      - templates/src/__tests__/integration.spec.ts.tpl

  - if: "{{ prompts.unit_test | default(value=false) }}"
    type: add-many
    base_path: templates
    files:
      - templates/vitest.config.unit.ts.tpl
      - templates/src/add.spec.ts.tpl

  - type: prepend-content
    target: cog_config
    entries:
      - content: |
          [packages."{{ vars.full_package_name }}"]
          path = "{{ vars.generated_dir }}"
          include = [
              "{{ vars.generated_dir }}/**",
          ]
          public_api = {{ prompts.published }}
        pattern: "@anchor:new-typescript-package"

  - type: transform-many
    command: bun x biome format --stdin-file-path=$FILENAME
    supports_dry_run: true
    files:
      - "**/*.ts"
      - "**/*.json"

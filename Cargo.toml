license = "MIT"
repository = "https://github.com/omni-oss/omni"
keywords = []
readme = "README.md"
documentation = "https://docs.rs/omni"
description = "A build system for the modern age"
categories = []
rust-version = "1.96.0"
edition = "2024"
version = "0.17.1"
authors = ["Clarence Manuel <rencedm112@gmail.com>"]


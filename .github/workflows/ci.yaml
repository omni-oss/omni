name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*"
      - "!./apps/site/**"
      - "!bun.lock"
    # only trigger on tags that are workspace tags (e.g. v1.2.3) and not on tags that are for specific packages (e.g. package-v1.2.3)
    tags:
      - "v*.*.*"
      - "!*-v*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.plan.outputs.jobs }}
      jobs_test_typescript: ${{ steps.plan.outputs.jobs_test_typescript }}
      jobs_test_typescript_count: ${{ steps.plan.outputs.jobs_test_typescript_count }}
      jobs_test_rust: ${{ steps.plan.outputs.jobs_test_rust }}
      jobs_test_rust_count: ${{ steps.plan.outputs.jobs_test_rust_count }}
      jobs_build_typescript: ${{ steps.plan.outputs.jobs_build_typescript }}
      jobs_build_typescript_count: ${{ steps.plan.outputs.jobs_build_typescript_count }}
      jobs_build_rust: ${{ steps.plan.outputs.jobs_build_rust }}
      jobs_build_rust_count: ${{ steps.plan.outputs.jobs_build_rust_count }}
      jobs_publish_npm: ${{ steps.plan.outputs.jobs_publish_npm }}
      jobs_publish_npm_count: ${{ steps.plan.outputs.jobs_publish_npm_count }}
      jobs_publish_rust_github: ${{ steps.plan.outputs.jobs_publish_rust_github }}
      jobs_publish_rust_github_count: ${{ steps.plan.outputs.jobs_publish_rust_github_count }}
      jobs_publish_generic: ${{ steps.plan.outputs.jobs_publish_generic }}
      jobs_publish_generic_count: ${{ steps.plan.outputs.jobs_publish_generic_count }}
      jobs_cache_restore_key_prefixes: ${{ steps.plan.outputs.jobs_cache_restore_key_prefixes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Omni
        uses: ./.github/actions/setup-omni
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: plan
          cache-restore-key-prefixes: |
            publish_rust_github
            publish_generic
            publish_npm
            build_rust
            build_typescript
            test_rust
            test_typescript
            plan

      - name: Setup Tools
        uses: ./.github/actions/setup-tools
        with:
          install-all: false
          install-bun: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Dry Run Results
        run: omni -i run -f=failed -d --result=result.json test build publish

      - name: Create Plan
        id: plan
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const execSync = require('child_process').execSync;

            // 1. Run the bun command
            execSync('bun --bun x @omni-oss/create-jobs result.json --output=jobs.json');

            // 2. Read and parse the generated JSON
            const jobsRaw = fs.readFileSync('jobs.json', 'utf8');
            const jobs = JSON.parse(jobsRaw);

            const updateArtifactData = (data) => {
                // do nothing for now
            }

            // Helper to set both the stringified JSON and the length count
            const setJobOutput = (name, data) => {
                data.forEach(updateArtifactData);
                core.setOutput(name, JSON.stringify(data));
                core.setOutput(`${name}_count`, data ? data.length : 0);
                core.info(`Set output ${name} to ${data.length} items:\n${JSON.stringify(data, null, 2)}`);
            };

            // 3. Set the full jobs output
            core.setOutput('jobs', jobsRaw);

            // 4. Set specific sections
            setJobOutput('jobs_test_typescript', jobs.test?.typescript || []);
            setJobOutput('jobs_test_rust', jobs.test?.rust || []);

            setJobOutput('jobs_build_typescript', jobs.build?.typescript || []);
            setJobOutput('jobs_build_rust', jobs.build?.rust || []);

            setJobOutput('jobs_publish_npm', jobs.publish?.npm || []);
            setJobOutput('jobs_publish_rust_github', jobs.publish?.rust_github || []);
            setJobOutput('jobs_publish_generic', jobs.publish?.generic || []);

      - name: Prune Unused Caches
        run: omni -i cache prune -sy -o="7d" # Remove stale caches older than 7 days

  test-rust:
    needs:
      - plan
    if: ${{ needs.plan.outputs.jobs_test_rust_count > 0 }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_test_rust }}
      cache-key-prefix: test_rust
      cache-restore-key-prefixes: |
        publish_rust_github
        build_rust
        test_rust

  test-typescript:
    needs:
      - plan
    if: ${{ needs.plan.outputs.jobs_test_typescript_count > 0 }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_test_typescript }}
      cache-key-prefix: test_typescript
      cache-restore-key-prefixes: |
        publish_npm
        build_typescript
        test_typescript

  build-rust:
    needs:
      - test-rust
      - plan
    if: ${{ needs.plan.outputs.jobs_build_rust_count > 0 }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_build_rust }}
      cache-key-prefix: build_rust
      cache-restore-key-prefixes: |
        publish_rust_github
        build_rust
      save-outputs: true
      artifacts-name: build-rust

  build-typescript:
    needs:
      - plan
      - test-typescript
    if: ${{ needs.plan.outputs.jobs_build_typescript_count > 0 }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_build_typescript }}
      cache-key-prefix: build_typescript
      cache-restore-key-prefixes: |
        build_typescript
        test_typescript
      save-outputs: true
      artifacts-name: build-typescript

  resolve-versions:
    needs:
      - plan
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      # Add a new output here (and a matching entry in VERSION_SPECS below)
      # to expose another package's version to downstream jobs.
      omni_version: ${{ steps.resolve.outputs.omni_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve versions from tags
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');

            // Registry of package versions to resolve from the tags at the
            // current commit. To support a new package, add an entry here and
            // declare a matching job output above.
            //
            //   output: the job output name to expose the version as.
            //   prefix: the tag prefix that precedes the `v<semver>` portion.
            //
            // e.g. the `omni-` prefix on the tag `omni-v0.17.1` yields the
            // exposed value `v0.17.1`.
            const VERSION_SPECS = [
              { output: 'omni_version', prefix: 'omni-' },
            ];

            // Gather all tags that point at the current (tagged) commit.
            const tags = execSync('git tag --points-at HEAD', { encoding: 'utf8' })
              .split('\n')
              .map((tag) => tag.trim())
              .filter(Boolean);

            core.info(`Tags at current commit:\n${tags.join('\n') || '(none)'}`);

            for (const { output, prefix } of VERSION_SPECS) {
              // Match `<prefix>v<semver>` and expose only the `v<semver>` part.
              const pattern = new RegExp(`^${prefix}(v\\d+\\.\\d+\\.\\d+.*)$`);
              const match = tags.map((tag) => tag.match(pattern)).find(Boolean);
              const version = match ? match[1] : '';

              if (version) {
                core.info(`Resolved ${output}: ${version}`);
              } else {
                core.info(`No tag matching ${prefix}v<semver> found for ${output}`);
              }

              core.setOutput(output, version);
            }

  publish-generic:
    needs:
      - plan
      - resolve-versions
      - build-rust
      - build-typescript
    if: ${{ needs.plan.outputs.jobs_publish_generic_count > 0 && startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_publish_generic }}
      cache-key-prefix: publish_generic
      cache-restore-key-prefixes: |
        publish_generic
        publish_rust_github
        publish_npm
        build_rust
        build_typescript
        test_rust
        test_typescript

  publish-npm:
    needs:
      - plan
      - resolve-versions
      - build-typescript
    if: ${{ needs.plan.outputs.jobs_publish_npm_count > 0 && startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/run-omni-jobs.yaml
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_publish_npm }}
      cache-key-prefix: publish_npm
      cache-restore-key-prefixes: |
        publish_npm
        build_rust
        build_typescript

  publish-rust-github:
    needs:
      - plan
      - resolve-versions
      - build-rust
    if: ${{ needs.plan.outputs.jobs_publish_rust_github_count > 0 && startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/publish-rust-github.yaml
    permissions:
      actions: read
      contents: write
    secrets: inherit
    with:
      jobs: ${{ needs.plan.outputs.jobs_publish_rust_github }}
      artifacts_pattern: build-rust-*

  publish-json-schemas:
    needs:
      - plan
      - resolve-versions
      - build-rust
      - publish-rust-github
    if: ${{ needs.plan.outputs.jobs_publish_rust_github_count > 0 && startsWith(github.ref, 'refs/tags/') }}
    uses: ./.github/workflows/publish-json-schemas.yaml
    secrets: inherit
    permissions:
      actions: read
      contents: write
    with:
      version: ${{ needs.resolve-versions.outputs.omni_version }}

  publish-perf-comparison:
    needs:
      - plan
      - resolve-versions
      - publish-rust-github
      - publish-npm
    if: ${{ needs.plan.outputs.jobs_publish_rust_github_count > 0 && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch Publish Performance Comparison
        uses: actions/github-script@v7
        env:
          OMNI_VERSION: ${{ needs.resolve-versions.outputs.omni_version }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-perf-comparison.yaml',
              ref: tag,
              inputs: {
                version: process.env.OMNI_VERSION,
                resource_runs: '3',
              },
            });

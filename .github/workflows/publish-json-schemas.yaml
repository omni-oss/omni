name: Publish JSON Schemas

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        type: string
        description: "Version to publish"

  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "latest"
        description: "Version to publish"

permissions:
  contents: write

jobs:
  publish-json-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Omni
        uses: omni-oss/setup-omni@v2
        with:
          version: ${{ github.event.inputs.version || 'latest' }}
          github-token: ${{ github.token }}

      - name: Generate JSON Schemas
        shell: bash
        run: |
          mkdir -p ./json-schemas
          INSTALLED_VERSION=$(omni --version | cut -d' ' -f2)

          # loop through all the json schemas and publish them
          schemas=("project" "workspace" "generator")
          for schema in "${schemas[@]}"; do
            echo "Publishing $schema schema..."

            omni config schema $schema >| "./json-schemas/$schema.json"
          done

      - name: Publish JSON Schemas
        uses: peaceiris/actions-gh-pages@v3
        with:
          external_repository: omni-oss/json-schemas
          publish_branch: main
          #github_token: ${{ secrets.GITHUB_TOKEN }}
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./json-schemas
          destination_dir: .
          keep_files: true
          tag_name: ${{ github.event.inputs.version || 'latest' }}
          tag_message: "Publish version ${{ github.event.inputs.version || 'latest' }}"

# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/omni-remote-cache-service-tests"

extends:
  - "@workspace/omni/presets/ts-lib.omni.yaml"

tasks:
  build:
    enabled: false

  test:service:
    exec: bun x vitest --config ./vitest.config.service.ts run
    max_retries: 3
    retry_interval: 2s
    dependencies:
      - omni_remote_cache_service#build

  test:
    dependencies:
      - test:service

  publish:
    enabled: false

dependencies:
  - omni_remote_cache_service

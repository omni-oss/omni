# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/bridge-service-tests"

extends:
  - "@workspace/omni/presets/ts-vite-test.omni.yaml"

dependencies:
  append:
    - "@omni-oss/tsconfig"
    - "@omni-oss/vite-config"
    - "@omni-oss/vitest-config"
    - "@omni-oss/bridge-rpc-core"
    - "@omni-oss/runtime-utils"
    - "@omni-oss/bridge-rpc-bootstrap"
    - "@omni-oss/bridge-rpc-utils"
    - "@omni-oss/bridge-service"
    - "@omni-oss/log"

tasks:
  test:service:
    enabled: true
    dependencies:
      append:
        - "@omni-oss/bridge-service#build"
        - "omni_bridge_test_service#build"

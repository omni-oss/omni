log = { workspace = true }
bon = { workspace = true }
bridge_rpc_core = { workspace = true }
bridge_rpc_router = { workspace = true }
bridge_rpc_services = { workspace = true }
bridge_rpc_utils = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
system_traits = { workspace = true, features = ["real-async-tokio", "real-sync"] }
tracing-subscriber = { workspace = true }
tracing-log = { workspace = true }
atty = { workspace = true }
os_pipe = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
omni_utils = { workspace = true }
derive-new = { workspace = true }

[dev-dependencies]
test-log = { workspace = true }
ntest = { workspace = true }
rstest = { workspace = true }
rstest_reuse = { workspace = true }

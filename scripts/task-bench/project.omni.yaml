# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/task-bench"

extends:
  - "@workspace/omni/presets/ts-vite-script.omni.yaml"


dependencies:
  append:
    - "@omni-oss/tsconfig"
    - "@omni-oss/vite-config"
    - "@omni-oss/vitest-config"
    - "@omni-oss/workspace-gen"

tasks:
  test:unit:
    enabled: true
    dependencies:
      append:
        - ^build

  test:integration:
    enabled: false
    dependencies:
      append:
        - ^build

  test:
    enabled: true

  build:
    enabled: true

  publish:
    enabled: true

meta:
  publish: true

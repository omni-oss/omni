# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: omni_task_executor

extends:
  - "@workspace/omni/presets/rust-lib.omni.yaml"

tasks:
  bench:
    enabled: true

  profile:
    env:
      vars:
        RUST_PROFILE_ADDITIONAL_ARGS: --features=bench-support
        bench: cache_lookup
    enabled: true

dependencies:
  - omni_core
  - omni_configurations
  - omni_expressions
  - omni_hasher
  - omni_cache
  - omni_messages
  - omni_execution_plan
  - omni_task_context
  - omni_collector
  - omni_types
  - omni_process
  - omni_context
  - omni_tera
  - omni_config_types
  - env
  - system_traits
  - maps
  - config_utils

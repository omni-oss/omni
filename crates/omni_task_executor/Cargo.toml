[package]
name = "omni_task_executor"
rust-version.workspace = true
edition.workspace = true
version = "0.9.0"
repository.workspace = true

[features]
default = ["enable-tracing"]
enable-tracing = ["trace/enabled"]
# Exposes internal pipeline components (plan provider, cache manager, task
# context provider) so the crate's own criterion benches can measure
# individual stages in isolation. Not for production use.
bench-support = []
vendored-openssl = [
    "omni_cache/vendored-openssl",
    "omni_context/vendored-openssl",
    "omni_execution_plan/vendored-openssl",
]

[[bench]]
name = "plan_building"
path = "benches/plan_building.rs"
harness = false
required-features = ["bench-support"]

[[bench]]
name = "cache_lookup"
path = "benches/cache_lookup.rs"
harness = false
required-features = ["bench-support"]

[dependencies]
eyre = { workspace = true }
thiserror = { workspace = true }
strum = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
omni_core = { workspace = true }

trace = { workspace = true }
log = { workspace = true }
tracing = { workspace = true }
shlex = { workspace = true }
omni_hasher = { workspace = true }
system_traits = { workspace = true }
bytes = { workspace = true }

derive-new = { workspace = true }
futures = { workspace = true }
maps = { workspace = true }
env = { workspace = true }
omni_configurations = { workspace = true }
omni_expressions = { workspace = true }
omni_context = { workspace = true }
omni_process = { workspace = true }
globset = { workspace = true }
config_utils = { workspace = true }
derive_builder = { workspace = true }
getset = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
omni_cache = { workspace = true }
ahash = { workspace = true }
bs58 = { workspace = true }
num_cpus = { workspace = true }
omni_messages = { workspace = true }

omni_execution_plan = { workspace = true }
omni_task_context = { workspace = true }
omni_task_output_logs = { workspace = true }
omni_collector = { workspace = true }
omni_types = { workspace = true }
omni_tera = { workspace = true }
omni_config_types = { workspace = true }
bon = { workspace = true }
schemars = { workspace = true }

[dev-dependencies]

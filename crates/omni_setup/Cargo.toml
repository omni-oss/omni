[package]
name = "omni_setup"
rust-version.workspace = true
edition.workspace = true
version = "0.1.2"
authors.workspace = true
repository.workspace = true

[features]
default = ["enable-tracing"]
enable-tracing = ["dep:tracing", "trace/enabled"]

[dependencies]
eyre = { workspace = true }
thiserror = { workspace = true }
strum = { workspace = true }
trace = { workspace = true }
log = { workspace = true }
tracing = { workspace = true, optional = true }
serde = { workspace = true }
omni_configurations = { workspace = true }
omni_remote_cache_client = { workspace = true }
derive-new = { workspace = true }
keyring-core = { workspace = true }
machine-uid = { workspace = true }
rand = { workspace = true }
ring = { workspace = true }
base64 = { workspace = true }
rmp-serde = { workspace = true }
tokio = { workspace = true }
omni_file_data_serde = { workspace = true }
system_traits = { workspace = true, features = ["memory-async", "memory-sync", "real-sync", "real-async-tokio"] }
bon = { workspace = true }
regex = { workspace = true }
uuid = { workspace = true }
dashmap = { workspace = true }
time = { workspace = true }
directories = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-native-keyring-store = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
zbus-secret-service-keyring-store = { workspace = true }
linux-keyutils-keyring-store = { workspace = true }


[dev-dependencies]
fastrand = { workspace = true }

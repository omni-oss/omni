# yaml-language-server: $schema=https://raw.githubusercontent.com/omni-oss/json-schemas/refs/heads/main/project.json
name: "@omni-oss/site"

extends:
  - "@workspace/omni/presets/ts-app.omni.yaml"

cache:
  key:
    files:
      append:
        - panda.config.ts
        - vite.config.ts

tasks:
  test:
    enabled: false

  test:unit:
    enabled: false

  test:integration:
    enabled: false

  gen:declspec:
    exec: bun run gen:declspec
    cache:
      output:
        files:
          - ./omni-declspec.json

  gen:refdocs:
    cache:
      key:
        files:
          append:
            - ./scripts/generate-references/**/*
            - ./omni-declspec.json
      output:
        files:
          - content/docs/references/**/*

    dependencies:
      - gen:declspec
    exec: bun run gen:refdocs

  gen:
    dependencies:
      - gen:refdocs

  prepare: bun x panda codegen

  build:
    enabled: true
    dependencies:
      - prepare
      - gen:refdocs

    cache:
      output:
        files:
          - .vercel/**/*
